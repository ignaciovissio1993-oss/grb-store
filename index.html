<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Streetwear Supply — Tienda Demo</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --panel: #ffffff;
      --panel-2: #f2f2ee;
      --text: #141414;
      --muted: #5f5f5f;
      --accent: #c7ff3d;
      --accent-2: #ff6b9a;
      --border: #d9d9d2;
      --shadow: 0 12px 30px rgba(0,0,0,0.12);
      --header-offset: 76px;
      --filters-sticky-offset: var(--header-offset);
      --filters-bg: rgba(255,255,255,0.92);
      --filters-bar-height: 0px;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, #ffffff 0%, #f4f4f1 55%, #efefea 100%);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.85);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .brand-link {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-right: auto;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }
    .brand-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 10px;
    }
    .brand {
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0;
      min-width: 0;
      max-width: 100%;
    }
    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }
    .filters-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(var(--filters-bar-height) + 12px) 20px 0;
    }
    .container,
    #storefront-view,
    #storefront-home {
      overflow: visible;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
    }
    .cart-count {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--accent);
      color: #0b0b0b;
      font-weight: 700;
      font-size: 0.7rem;
      margin-left: 6px;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .nav button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
    .nav button.active {
      background: linear-gradient(135deg, var(--accent), #b0ff3f);
      color: #0b0b0b;
      border-color: transparent;
      box-shadow: var(--shadow);
    }
    .filters-bar {
      position: fixed;
      top: var(--filters-sticky-offset);
      left: 0;
      right: 0;
      z-index: 20;
      margin-bottom: 0;
      padding: 0 20px;
    }
    .filters-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      margin-bottom: 0;
      background: var(--filters-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(217,217,210,0.9);
      border-bottom: 1px solid rgba(217,217,210,0.95);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 10px 24px rgba(18,18,18,0.08);
      transition: background-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .filters-label {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(217,217,210,0.7);
      flex: 0 0 auto;
    }
    .filters-row .search {
      margin-left: 0;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      width: min(900px, 100%);
      flex: 1 1 440px;
    }
    .filters-row .search select {
      min-width: 0;
      background: rgba(250,250,247,0.96);
      border-color: rgba(217,217,210,0.95);
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }
    .filters-row .search select:focus {
      outline: none;
      border-color: rgba(20,20,20,0.28);
      box-shadow: 0 0 0 3px rgba(199,255,61,0.18);
    }
    .carousel {
      position: relative;
      border-radius: 18px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      background: #0f0f0f;
      height: 380px;
    }
    .carousel-track {
      display: flex;
      transition: transform 0.6s ease;
      will-change: transform;
      height: 100%;
    }
    .carousel-slide {
      min-width: 100%;
      height: 100%;
      aspect-ratio: auto;
      position: relative;
      overflow: hidden;
    }
    .carousel-slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5, 5, 5, 0.05), rgba(5, 5, 5, 0.35));
      pointer-events: none;
    }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.01);
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(8, 8, 8, 0.55);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 2;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .carousel-btn:hover {
      transform: translateY(-50%) scale(1.05);
      background: rgba(8, 8, 8, 0.75);
    }
    .carousel-btn.prev { left: 14px; }
    .carousel-btn.next { right: 14px; }
    .carousel-dots {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .carousel-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .carousel-dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }
    .hero {
      background: linear-gradient(120deg, #ffffff, #f5f5f1 55%, #f0f0ec);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 520px;
    }
    .search {
      margin-left: auto;
      display: flex;
      gap: 10px;
      width: min(380px, 100%);
    }
    .search select {
      min-width: 160px;
    }
    .search input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }
    #search {
      display: none;
    }
    .section-title {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 30px 0 14px;
    }
    .local-card {
      position: relative;
      display: flex;
      align-items: flex-end;
      min-height: 260px;
      padding: 22px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background-size: cover;
      background-position: center;
      color: #f8f8f4;
      text-decoration: none;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .local-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(5, 5, 5, 0.78), rgba(5, 5, 5, 0.25));
      pointer-events: none;
    }
    .local-card:hover {
      transform: translateY(-4px);
      border-color: #2e2e2e;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    .local-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 8px;
      max-width: 420px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(16, 16, 16, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
    }
    .local-title {
      margin: 0;
      font-size: clamp(1.1rem, 2.4vw, 1.6rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .local-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f3f3ed;
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .category-card {
      position: relative;
      min-height: 220px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      text-decoration: none;
      color: #f8f8f4;
      display: flex;
      align-items: flex-end;
      padding: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .category-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(5, 5, 5, 0.75), rgba(5, 5, 5, 0.15));
    }
    .category-card:hover {
      transform: translateY(-4px);
      border-color: #2e2e2e;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    .category-label {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 260px);
      gap: 16px;
      justify-content: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: #3a3a3a;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    .product-image-button {
      border: none;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
    }
    .image-wrap {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
    }
    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    .image-wrap .secondary {
      position: absolute;
      inset: 0;
      opacity: 0;
    }
    .card:hover .image-wrap img {
      transform: scale(1.03);
    }
    .card-body {
      padding: 14px 14px 58px;
      display: grid;
      gap: 8px;
    }
    .card-cta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px;
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.92) 45%, rgba(255,255,255,0.98) 100%);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .card-cta .card-cta-btn {
      width: 100%;
      border-radius: 999px;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
    }
    .card:hover .card-cta,
    .card:focus-within .card-cta {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .price {
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .sizes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .size-tag {
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .admin {
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 20px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .panel h3 { margin-top: 0; }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 12px 0 6px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fafaf7;
      color: var(--text);
    }
    textarea { min-height: 90px; resize: vertical; }
    .size-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .size-options label {
      margin: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .size-options input[type="number"] {
      width: 100%;
      text-align: center;
      padding: 8px;
    }
    .size-measurements {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .size-measurements label {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(40px, 56px) minmax(180px, 1fr);
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .size-measurements input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fafaf7;
      color: var(--text);
    }
    .detail-view {
      margin-top: 22px;
    }
    .detail-card {
      background: linear-gradient(135deg, #ffffff, #f5f5f0 60%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: minmax(260px, 420px) 1fr;
      gap: 24px;
      padding: 22px;
      align-items: start;
    }
    .detail-gallery {
      position: relative;
      width: 100%;
      min-width: 0;
    }
    .detail-gallery-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fafaf7;
      -webkit-overflow-scrolling: touch;
    }
    .detail-gallery-track::-webkit-scrollbar { display: none; }
    .detail-gallery-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
    }
    .detail-image {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
    }
    .detail-gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      width: 36px;
      height: 36px;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
    }
    .detail-gallery-nav.prev { left: 10px; }
    .detail-gallery-nav.next { right: 10px; }
    .detail-gallery-nav.hidden { display: none; }
    .detail-meta {
      display: grid;
      gap: 12px;
    }
    .detail-title {
      font-size: clamp(1.4rem, 2vw, 2rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
    }
    .detail-description {
      color: var(--muted);
      line-height: 1.6;
    }
    .detail-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    .back-btn {
      background: #f1f1ec;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .stock-list {
      display: grid;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .stock-row {
      display: grid;
      grid-template-columns: minmax(36px, 52px) minmax(140px, 1fr) auto;
      gap: 12px;
      align-items: center;
      border-bottom: 1px dashed rgba(0,0,0,0.12);
      padding: 6px 0;
    }
    .stock-row:last-child { border-bottom: none; padding-bottom: 0; }
    .stock-row.stock-header {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding-top: 0;
    }
    .stock-row.stock-header span { color: var(--muted); }
    .stock-label { color: var(--text); }
    .stock-empty { color: var(--accent-2); font-weight: 600; }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .auth-panel {
      margin-bottom: 24px;
    }
    .auth-grid {
      display: grid;
      gap: 10px;
    }
    .auth-status {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .auth-message {
      color: var(--accent-2);
      font-size: 0.85rem;
      min-height: 1.2em;
    }
    .admin-message {
      font-size: 0.85rem;
      min-height: 1.2em;
      margin-top: 10px;
    }
    .admin-message.success { color: var(--accent); }
    .admin-message.error { color: var(--accent-2); }
    .image-preview {
      margin-top: 10px;
      width: 100%;
      height: 180px;
      border-radius: 12px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #fafaf7;
      display: none;
    }
    .cart-controls {
      display: grid;
      gap: 10px;
      max-width: 280px;
      margin-top: 10px;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fafaf7;
      color: var(--text);
    }
    .btn {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn.primary { background: var(--accent); color: #0b0b0b; }
    .btn.secondary { background: #f2f2ee; color: var(--text); border: 1px solid var(--border); }
    .admin-list {
      display: grid;
      gap: 10px;
    }
    .admin-item {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fbfbf8;
    }
    .admin-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 10px;
    }
    .admin-actions {
      display: flex;
      gap: 8px;
    }
    .admin-actions button {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f5f5f0;
      color: var(--text);
      cursor: pointer;
    }
    .hidden { display: none; }
    .loader {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .loader-dots {
      display: inline-flex;
      gap: 4px;
    }
    .loader-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.15s; }
    .loader-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {

    }

    syncStickyOffset();

      headerResizeObserver.observe(header);

      if (!filtersBar) return;

    function setCarouselIndex(nextIndex) {
      if (!carouselTrack || carouselSlides.length === 0) return;
      const total = carouselSlides.length;
      carouselIndex = ((nextIndex % total) + total) % total;
      carouselTrack.style.transform = `translateX(-${carouselIndex * 100}%)`;
      carouselDots.forEach((dot, index) => {
        dot.classList.toggle('active', index === carouselIndex);
      });
    }

    function stopCarouselAutoplay() {
      if (carouselTimer) {
        clearInterval(carouselTimer);
        carouselTimer = null;
      }
    }

      if (!carouselTrack || carouselSlides.length < 2) return;
      stopCarouselAutoplay();
      carouselTimer = setInterval(() => {
        setCarouselIndex(carouselIndex + 1);
      }, 6500);
    }

    if (carouselTrack) {
      setCarouselIndex(0);
      startCarouselAutoplay();
      carouselPrev?.addEventListener('click', () => {
        setCarouselIndex(carouselIndex - 1);
      });
      carouselNext?.addEventListener('click', () => {
        setCarouselIndex(carouselIndex + 1);
      });
      carouselDots.forEach(dot => {
        dot.addEventListener('click', () => {
          const targetIndex = Number(dot.dataset.carouselIndex || 0);
          setCarouselIndex(targetIndex);

      });
      carousel?.addEventListener('mouseenter', stopCarouselAutoplay);
      carousel?.addEventListener('mouseleave', startCarouselAutoplay);

    function normalizeSizeMeasurements(product) {
      let raw = product?.size_measurements ?? null;
      if (typeof raw === 'string') {
        try {
          raw = JSON.parse(raw);
        } catch (error) {
          console.warn('[debug] size_measurements JSON parse failed:', error);
          raw = null;
        }
      }
      if (!raw || typeof raw !== 'object') return {};
      const normalized = {};
      SIZE_KEYS.forEach(size => {
        const value = raw[size];
        if (value === undefined || value === null) return;
        const text = String(value).trim();
        if (text) normalized[size] = text;
      });
      return normalized;
    }

    function getSizeMeasurements() {
      const measurements = {};
      measurementsContainer.querySelectorAll('input[type="text"]').forEach(input => {
        const size = input.dataset.size;
        const rawValue = input.value;
        const trimmed = rawValue.trim();
        if (trimmed) measurements[size] = rawValue;
      });
      return Object.keys(measurements).length ? measurements : null;
    }

    function setSizeMeasurements(measurements) {
      const normalized = measurements ? normalizeSizeMeasurements({ size_measurements: measurements }) : {};
      measurementsContainer.querySelectorAll('input[type="text"]').forEach(input => {
        const size = input.dataset.size;
        input.value = normalized[size] || '';
      });
    }

    function normalizeStockBySize(product) {
      let raw = product?.stock_by_size ?? null;
      console.log('[debug] stock_by_size raw:', raw);
      if (typeof raw === 'string') {
        try {
          raw = JSON.parse(raw);
        } catch (error) {
          console.warn('[debug] stock_by_size JSON parse failed:', error);
          raw = null;
        }
      }
      if (!raw || typeof raw !== 'object') return {};
      const normalized = {};
      Object.entries(raw).forEach(([size, value]) => {
        const qty = Number(value);
        normalized[size] = Number.isFinite(qty) ? qty : 0;
      });
      return normalized;
    }

    function getQuickAddSize(product) {
      const stock = normalizeStockBySize(product);
      const available = Object.keys(stock).filter(size => stock[size] > 0);
      return available.length === 1 ? available[0] : null;
    }

    async function loadProducts({ reason = 'manual' } = {}) {
      if (productsLoadState.inFlight) return productsLoadState.inFlight;
      const loadPromise = (async () => {
        console.log('[app] loadProducts called', { reason });
        console.log('[app] product load start', { reason });
        productsLoadState.status = 'loading';
        productsLoadState.errorMessage = '';
        const timeoutMs = 5000;
        const timeoutPromise = new Promise(resolve => {
          setTimeout(() => {
            resolve({
              data: [],
              error: { message: `Timeout after ${timeoutMs}ms`, code: 'TIMEOUT' },
              timeout: true
            });
          }, timeoutMs);
        });

        try {
          const result = await Promise.race([
            supabase
              .from('products')
              .select('*')
              .order('id', { ascending: true }),
            timeoutPromise
          ]);

          const { data, error } = result || {};
          if (result?.timeout) {
            console.warn('Products request timed out. Rendering empty list to keep UI responsive.');
          }
          if (error) {
            console.error('Supabase error:', error);
            console.error('[app] product load error', error);
            products = data || [];
            productsLoadState.status = 'error';
            productsLoadState.errorMessage = 'No se pudieron cargar los productos';
          } else {
            products = data || [];
            productsLoadState.status = 'success';
            productsLoadState.errorMessage = '';
            console.log('[app] product load success', { count: products.length });
          }
          renderProducts({ reason: 'load' });
          renderAdminList();
          if (activeProductId) {
            const updated = products.find(p => String(p.id) === String(activeProductId));
            if (updated) {
              showProductDetail(updated);
            }
          }
        } catch (err) {
          console.error('[app] product load error', err);
          products = [];
          productsLoadState.status = 'error';
          productsLoadState.errorMessage = 'No se pudieron cargar los productos';
          renderProducts({ reason: 'load-error' });
          renderAdminList();
        } finally {
          document.querySelector('#loading')?.classList.add('hidden');
          console.log('[app] product load end', { status: productsLoadState.status });
        }
      })();
      productsLoadState.inFlight = loadPromise;
      try {
        return await loadPromise;
      } finally {
        productsLoadState.inFlight = null;
      }
    }

    function renderProducts({ reason = 'manual' } = {}) {
      console.log('[app] renderProducts called', { reason });
      console.log('[app] product render start', { reason, status: productsLoadState.status });
      const query = searchInput.value.toLowerCase();

      const selectedSize = sizeFilter?.value || 'Todos';
      const filtered = products.filter(product => {
        const matchesQuery = (product.title || '').toLowerCase().includes(query);
        if (!matchesQuery) return false;
        if (selectedCategory === 'Todas') return true;
        const categoryValue = (product.category || '').trim();
        if (categoryValue !== selectedCategory) return false;
        return true;
      }).filter(product => {
        if (selectedGender === 'Todas') return true;
        const productGender = (product.target_gender || '').trim();
        return productGender === selectedGender;
      }).filter(product => {
        if (selectedSize === 'Todos') return true;
        const stock = normalizeStockBySize(product);
        return Number(stock[selectedSize] || 0) > 0;
      });
      const sorted = [...filtered];
      if (selectedPriceOrder === 'asc') {
        sorted.sort((a, b) => Number(a.price || 0) - Number(b.price || 0));
      } else if (selectedPriceOrder === 'desc') {
        sorted.sort((a, b) => Number(b.price || 0) - Number(a.price || 0));
      }
      if (sorted.length === 0) {
        if (productsLoadState.status === 'loading') {
          productGrid.innerHTML = `
            <div class="auth-status">
              <span class="loader">
                Cargando productos...

                  <span class="loader-dot"></span>

          console.log('[app] products count rendered', { count: 0, loading: true });

          return;
        }
        if (productsLoadState.status === 'error') {

          return;
        }
        if (products.length === 0) {
          productGrid.innerHTML = `<div class="auth-status">No hay productos disponibles</div>`;
          console.log('[app] products count rendered', { count: 0, empty: true });
          console.log('[app] product render end', { count: 0, empty: true });
          return;
        }
        productGrid.innerHTML = `<div class="auth-status">No hay resultados para tu búsqueda</div>`;
          console.log('[app] products count rendered', { count: 0, filtered: true });
          console.log('[app] product render end', { count: 0, filtered: true });
        return;
      }
      productGrid.innerHTML = sorted.map(product => `
        <article class="card">
          <button class="product-image-button" data-id="${product.id}" aria-label="Ver detalle de ${product.title}">
            <div class="image-wrap">
              <img class="primary" src="${product.image_url || FALLBACK_IMAGE}" alt="${product.title}" onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}';" />
            </div>
          </button>
          <div class="card-body">
            <strong>${product.title}</strong>
            <div class="price">$${Number(product.price).toFixed(2)}</div>
            <div>${summarizeDescription(product.description)}</div>
          </div>
          <div class="card-cta">
            <button class="btn primary card-cta-btn" data-action="add-to-cart" data-id="${product.id}" type="button">
              Agregar al carrito
            </button>
          </div>
        </article>
      `).join('');
      console.log('[app] products count rendered', { count: sorted.length, error: false });
      console.log('[app] product render end', { count: sorted.length, error: false });
    }

    function renderStockRows(product) {
      const stock = normalizeStockBySize(product);
      const measurements = normalizeSizeMeasurements(product);
      const sizes = SIZE_KEYS.filter(size => Object.prototype.hasOwnProperty.call(stock, size));
      const hasStock = sizes.some(size => stock[size] > 0);
      if (!hasStock) {
        return `<div class="stock-empty">Sin stock</div>`;
      }
      return `
        <div class="stock-row stock-header">
          <span>Talle</span>
          <span>Medida</span>
          <span>Stock</span>
        </div>
        ${sizes.map(size => `
          <div class="stock-row">
            <span class="stock-label">${size}</span>
            <span>${measurements[size] || ''}</span>
            <span>${stock[size] > 0 ? stock[size] : 'sin stock'}</span>
          </div>
        `).join('')}
      `;
    }

    async function uploadProductImage(file) {
      if (!file) return { publicUrl: '', error: null };
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const safeExt = ext.replace(/[^a-z0-9]/g, '') || 'jpg';
      const fileName = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${safeExt}`;
      const filePath = `products/${fileName}`;
      const { error: uploadError } = await supabase
        .storage
        .from('product-images')
        .upload(filePath, file, { contentType: file.type || 'image/jpeg' });
      if (uploadError) {
        return { publicUrl: '', error: uploadError };
      }
      const { data: publicData } = supabase
        .storage
        .from('product-images')
        .getPublicUrl(filePath);
      return { publicUrl: publicData?.publicUrl || '', error: null };
    }

      let imageUrl = imageField.value.trim();
      let extraImageUrl1 = extraImageField1.value.trim();
      let extraImageUrl2 = extraImageField2.value.trim();
      if (selectedImageFile) {
        const uploadResult = await uploadProductImage(selectedImageFile);
        if (uploadResult.error || !uploadResult.publicUrl) {
          console.error('Failed to upload image:', uploadResult.error);
        setAdminMessage(uploadResult.error?.message || 'No se pudo subir la imagen.', 'error');
        return;
      }
        imageUrl = uploadResult.publicUrl;
      } else if (!imageUrl && existingImageUrl) {
        imageUrl = existingImageUrl;
      }
      if (selectedExtraImageFile1) {
        const uploadResult = await uploadProductImage(selectedExtraImageFile1);
        if (uploadResult.error || !uploadResult.publicUrl) {
          console.error('Failed to upload extra image 1:', uploadResult.error);
          setAdminMessage(uploadResult.error?.message || 'No se pudo subir la imagen extra 1.', 'error');
          return;
        }
        extraImageUrl1 = uploadResult.publicUrl;
      } else if (!extraImageUrl1 && existingExtraImageUrl1) {
        extraImageUrl1 = existingExtraImageUrl1;
      }
      if (selectedExtraImageFile2) {
        const uploadResult = await uploadProductImage(selectedExtraImageFile2);
        if (uploadResult.error || !uploadResult.publicUrl) {
          console.error('Failed to upload extra image 2:', uploadResult.error);
          setAdminMessage(uploadResult.error?.message || 'No se pudo subir la imagen extra 2.', 'error');
          return;
        }
        extraImageUrl2 = uploadResult.publicUrl;
      } else if (!extraImageUrl2 && existingExtraImageUrl2) {
        extraImageUrl2 = existingExtraImageUrl2;
      }

      const sizeMeasurements = getSizeMeasurements();
      const categoryValue = categoryField.value.trim();
      const targetGenderValue = (targetGenderField?.value || '').trim();
      const payload = {
        title: titleField.value.trim(),
        description: descField.value.trim(),
        price: Number(priceField.value),
        image_url: imageUrl,
        extra_image_url_1: extraImageUrl1 || null,
        extra_image_url_2: extraImageUrl2 || null,
        stock_by_size: getStockBySize(),
        size_measurements: sizeMeasurements,
        category: categoryValue || null,
        target_gender: targetGenderValue || null
      };

      if (!payload.title || !payload.description || !payload.image_url) {
        setAdminMessage('Título, descripción e imagen son obligatorios.', 'error');
        return;
      }
      if (!Number.isFinite(payload.price)) {
        setAdminMessage('El precio debe ser un número válido.', 'error');
        return;
      }
      if (!currentUser) {
        console.warn('Admin action without logged in user. RLS may block insert/update.');
      }

      const id = idField.value;
      let result;
      if (id) {
        result = await supabase.from('products').update(payload).eq('id', id);
      } else {
        result = await supabase.from('products').insert(payload);
      }

      if (result.error) {
        console.error('Failed to save product:', result.error, payload);
        setAdminMessage(result.error.message || 'No se pudo guardar el producto.', 'error');
        return;
      }

      resetForm();
      await loadProducts();
      setAdminMessage('Producto guardado correctamente.', 'success');
    });

      showStorefrontList();
      renderProducts({ reason: 'search' });
    });

    categoryFilter.addEventListener('change', () => {
      showStorefrontList();
      renderProducts({ reason: 'category-filter' });
    });

    genderFilter?.addEventListener('change', () => {
      showStorefrontList();
      renderProducts({ reason: 'gender-filter' });
    });

    priceFilter?.addEventListener('change', () => {
      showStorefrontList();
      renderProducts({ reason: 'price-filter' });
    });

    sizeFilter?.addEventListener('change', () => {
      showStorefrontList();
      renderProducts({ reason: 'size-filter' });
    });

    const categoryCards = document.querySelectorAll('[data-category-card]');
    categoryCards.forEach(card => {
      card.addEventListener('click', (event) => {
        if (!categoryFilter) return;
        const targetCategory = card.dataset.category;
        if (!targetCategory) return;
        const hasOption = Array.from(categoryFilter.options)
          .some(option => option.value === targetCategory);
        if (!hasOption) return;
        event.preventDefault();
        categoryFilter.value = targetCategory;
        showStorefrontList();
        renderProducts({ reason: 'category-card' });
        storefrontList?.scrollIntoView({ behavior: 'smooth' });
      });
    });

    function setCartMessage(message) {
      cartMessage.textContent = message || '';
    }

    function updateAuthUI(user) {
      if (user) {
        authStatus.textContent = `Sesión iniciada como: ${user.email}`;
        logoutBtn.disabled = false;
        loginBtn.disabled = true;
        signupBtn.disabled = true;
      } else {
        authStatus.textContent = 'No has iniciado sesión';
        logoutBtn.disabled = true;
        loginBtn.disabled = false;
        signupBtn.disabled = false;
      }
      updateAdminNav(user);
    }

    async function refreshUser() {
      const { data } = await supabase.auth.getUser();
      currentUser = data.user || null;
      updateAuthUI(currentUser);
      await refreshCartCount();
    }

    function forceReloadToStorefront(reason) {
      // Intentional full reload: static HTML + Supabase auth can leave storefront state stale after auth changes.
      setActiveView('store', { reason });
      window.location.reload();
    }

    async function handleSignUp() {
      setCartMessage('');
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        setCartMessage('Email y contraseña son obligatorios.');
        return;
      }
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        setCartMessage(error.message);
        return;
      }
      console.log('[app] signup success', { email });
      await refreshUser();
      if (currentUser) setActiveView('store', { reason: 'signup' });
    }

    async function handleLogIn() {
      setCartMessage('');
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        setCartMessage('Email y contraseña son obligatorios.');
        return;
      }
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        setCartMessage(error.message);
        return;
      }
      console.log('[app] login success', { email });
      await refreshUser();
      if (currentUser) {
        forceReloadToStorefront('login');
      }
    }

    async function handleLogOut() {
      setCartMessage('');
      await supabase.auth.signOut();
      console.log('[app] logout success');
      await refreshUser();
      forceReloadToStorefront('logout');
    }

    signupBtn.addEventListener('click', handleSignUp);
    loginBtn.addEventListener('click', handleLogIn);
    logoutBtn.addEventListener('click', handleLogOut);

    supabase.auth.onAuthStateChange((_event, session) => {
      console.log('[app] auth state change', { event: _event, userId: session?.user?.id || null });
      currentUser = session?.user || null;
      updateAuthUI(currentUser);
      refreshCartCount();
      // Avoid partial re-renders here; login/logout handlers force a full reload for reliable storefront state.
    });

    function updateDetailSizes(product) {
      const stock = normalizeStockBySize(product);
      const availableSizes = SIZE_KEYS.filter(size => Number(stock[size] || 0) > 0);
      console.log('[debug] available sizes:', availableSizes);
      detailSize.innerHTML = availableSizes.map(size => (
        `<option value="${size}">${size}</option>`
      )).join('');

      const firstEnabled = detailSize.querySelector('option');
      if (firstEnabled) {
        detailSize.value = firstEnabled.value;
        detailSize.disabled = false;
        addToCartBtn.disabled = false;
        detailQty.disabled = false;
      } else {
        detailSize.value = '';
        detailSize.disabled = true;
        addToCartBtn.disabled = true;
        detailQty.disabled = true;
      }
      updateQuantityLimit(stock);
    }

    function updateQuantityLimit(stock) {
      const selectedSize = detailSize.value;
      const maxQty = stock && selectedSize ? stock[selectedSize] : 0;
      detailQty.max = maxQty || 1;
      if (Number(detailQty.value) < 1) detailQty.value = 1;
      if (maxQty && Number(detailQty.value) > maxQty) detailQty.value = maxQty;
    }

    detailSize.addEventListener('change', () => {
      const product = products.find(p => String(p.id) === String(activeProductId));
      if (!product) return;
      const stock = normalizeStockBySize(product);
      updateQuantityLimit(stock);
    });

    function renderDetailGallery(product) {
      const images = [
        product?.image_url,
        product?.extra_image_url_1,
        product?.extra_image_url_2
      ].filter(Boolean);
      if (images.length === 0) {
        images.push(FALLBACK_IMAGE);
      }
      detailGalleryTrack.innerHTML = images.map((url, index) => `
        <div class="detail-gallery-slide">
          <img class="detail-image" src="${url}" alt="Imagen del producto ${index + 1}" onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}';" />
        </div>
      `).join('');
      const showNav = images.length > 1;
      detailGalleryPrev.classList.toggle('hidden', !showNav);
      detailGalleryNext.classList.toggle('hidden', !showNav);
      detailGalleryTrack.scrollTo({ left: 0, behavior: 'auto' });
    }

    function scrollDetailGallery(direction) {
      const width = detailGalleryTrack.clientWidth;
      if (!width) return;
      detailGalleryTrack.scrollBy({ left: direction * width, behavior: 'smooth' });
    }

    detailGalleryPrev.addEventListener('click', () => scrollDetailGallery(-1));
    detailGalleryNext.addEventListener('click', () => scrollDetailGallery(1));

    async function fetchLiveStockBySize(productId) {
      const { data, error } = await supabase
        .from('products')
        .select('stock_by_size')
        .eq('id', productId)
        .single();
      if (error) {
        console.error('Failed to fetch product stock:', error);
        return null;
      }
      return normalizeStockBySize({ stock_by_size: data?.stock_by_size });
    }

    async function saveCartItem(productId, selectedSize, quantity) {
      if (!currentUser?.id) {
        setCartMessage('Iniciá sesión para guardar items en tu carrito.');
        return;
      }
      const liveStock = await fetchLiveStockBySize(productId);
      if (!liveStock || !selectedSize) {
        setCartMessage('No hay stock disponible');
        return;
      }
      const available = Number(liveStock[selectedSize] || 0);
      if (available <= 0) {
        setCartMessage('No hay stock disponible');
        return;
      }
      if (quantity > available) {
        setCartMessage('No hay suficiente stock para esa cantidad');
        return;
      }
      const payload = {
        user_id: currentUser.id,
        product_id: productId,
        size: selectedSize,
        quantity
      };
      const { error } = await supabase.from('cart_items').insert(payload);
      if (error) {
        console.error('Failed to add to cart:', error);
        setCartMessage(error.message);
        return;
      }
      setCartMessage('Agregado al carrito');
      await refreshCartCount();
    }

    addToCartBtn.addEventListener('click', async () => {
      setCartMessage('');
      if (!currentUser?.id) {
        setCartMessage('Iniciá sesión para guardar items en tu carrito.');
        return;
      }
      const selectedSize = detailSize.value;
      const quantity = Number(detailQty.value);
      if (!activeProductId || !selectedSize || !quantity || quantity < 1) return;
      await saveCartItem(activeProductId, selectedSize, quantity);
    });

    async function refreshCartCount() {
      if (!currentUser?.id) {
        cartCount.textContent = '0';
        return;
      }
      const { count, error } = await supabase
        .from('cart_items')
        .select('*', { count: 'exact', head: true })
        .eq('user_id', currentUser.id);
      if (error) {
        console.error('Failed to load cart count:', error);
        cartCount.textContent = '0';
        return;
      }
      cartCount.textContent = String(count || 0);
    }

    async function renderCartView() {
      await refreshUser();
      if (!currentUser?.id) {
        cartList.innerHTML = '';
        cartEmpty.classList.remove('hidden');
        cartEmpty.textContent = 'Iniciá sesión para ver tu carrito';
        return;
      }

      const { data: cartItems, error } = await supabase
        .from('cart_items')
        .select('id, product_id, size, quantity')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Failed to load cart:', error);
        cartList.innerHTML = '';
        cartEmpty.classList.remove('hidden');
        cartEmpty.textContent = error.message;
        return;
      }

      if (!cartItems || cartItems.length === 0) {
        cartList.innerHTML = '';
        cartEmpty.classList.remove('hidden');
        cartEmpty.textContent = 'Tu carrito está vacío';
        return;
      }

      const productIds = [...new Set(cartItems.map(item => item.product_id))];
      const { data: productData, error: productError } = await supabase
        .from('products')
        .select('id, title, price, image_url')
        .in('id', productIds);

      if (productError) {
        console.error('Failed to load products for cart:', productError);
      }

      const productMap = new Map((productData || []).map(p => [String(p.id), p]));
      cartEmpty.classList.add('hidden');
      cartList.innerHTML = cartItems.map(item => {
        const product = productMap.get(String(item.product_id)) || {};
        const price = Number(product.price || 0);
        const subtotal = price * Number(item.quantity || 0);
        return `
          <div class="admin-item">
            <img src="${product.image_url || FALLBACK_IMAGE}" alt="${product.title || 'Producto'}" onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}';" />
            <div>
              <strong>${product.title || 'Producto desconocido'}</strong><br />
              <span class="price">$${price.toFixed(2)}</span><br />
              <span>Talle: ${item.size}</span><br />
              <span>Cantidad: ${item.quantity}</span><br />
              <span>Subtotal: $${subtotal.toFixed(2)}</span>
            </div>
            <div class="admin-actions">
              <button data-action="remove" data-id="${item.id}">Quitar</button>
            </div>
          </div>
        `;
      }).join('');
    }

    cartBack.addEventListener('click', () => setActiveView('store', { reason: 'cart-back' }));

    cartList.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-action="remove"]');
      if (!button) return;
      const cartItemId = button.dataset.id;
      if (!cartItemId) return;
      // Delete cart item by id (RLS will enforce ownership)
      const { error } = await supabase
        .from('cart_items')
        .delete()
        .eq('id', cartItemId);
      if (error) {
        console.error('Failed to remove cart item:', error);
        return;
      }
      await renderCartView();
      await refreshCartCount();
    });

    function renderStorefront({ reason = 'manual' } = {}) {
      console.log('[app] storefront render start', { reason });
      try {
        showStorefrontList();
        renderProducts({ reason: `${reason}-storefront` });
        console.log('[app] storefront render success');
      } catch (error) {
        console.error('[app] storefront render error', error);
        productGrid.innerHTML = `<div class="auth-status">No se pudieron cargar los productos</div>`;
      }
    }

    async function initApp() {
      console.log('[app] init start');
      await refreshUser();
      console.log('[app] session on startup', { userId: currentUser?.id || null });
      await loadProducts({ reason: 'init' });
      renderStorefront({ reason: 'init' });
      console.log('[app] init end');
    }

    await initApp();
  </script>
</body>
</html>
